[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
robinhood = "https://rpc.mainnet.chain.robinhood.com"
base = "https://mainnet.base.org"
arbitrum = "https://arb1.arbitrum.io/rpc"
anvil = "http://localhost:8545"

[etherscan]
robinhood = { key = "${BLOCKSCOUT_KEY}", url = "https://robinhoodchain.blockscout.com/api" }
